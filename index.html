<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        Sistem Persetujuan Kredit Bank
    </title>



    <!-- FONT POPPINS -->

    <link rel="preconnect"
    href="https://fonts.googleapis.com">

    <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

    <link href=
    "https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">



    <!-- CSS -->

    <link rel="stylesheet"
    href="style.css">

</head>

<body>

    <div class="container">

        <h1>
            Sistem Persetujuan Kredit Bank
        </h1>



        <!-- INPUT PENGHASILAN -->

        <label>
            Penghasilan (juta)
        </label>

        <input
        type="number"
        id="penghasilan"
        placeholder="Masukkan penghasilan">



        <!-- INPUT LAMA KERJA -->

        <label>
            Lama Bekerja (tahun)
        </label>

        <input
        type="number"
        id="lamaKerja"
        placeholder="Masukkan lama kerja">



        <!-- INPUT RIWAYAT -->

        <label>
            Riwayat Kredit
        </label>

        <input
        type="number"
        id="riwayat"
        placeholder="Masukkan nilai riwayat kredit">



        <!-- INPUT HUTANG -->

        <label>
            Rasio Hutang (%)
        </label>

        <input
        type="number"
        id="hutang"
        placeholder="Masukkan rasio hutang">



        <!-- BUTTON -->

        <button onclick="prosesFuzzy()">

            PROSES

        </button>



        <!-- HASIL -->

        <div id="hasil"></div>

    </div>



    <!-- JAVASCRIPT -->

    <script src="script.js"></script>

</body>

</html>
